<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký bệnh nhân</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; max-width: 600px; }
        label { display: block; margin-top: 10px; font-weight: bold; }
        input { width: 100%; padding: 8px; margin-top: 4px; }
        .error { color: #c62828; margin-top: 4px; font-size: 14px; }
        .success { color: #2e7d32; margin-top: 10px; }
        .actions { margin-top: 14px; display: flex; gap: 8px; }
    </style>
</head>
<body>
<h1>Đăng ký tài khoản bệnh nhân</h1>

<p class="success" th:if="${successMessage}" th:text="${successMessage}"></p>

<form th:object="${registerForm}" th:action="@{/register}" method="post">
    <label for="username">Username</label>
    <input id="username" type="text" th:field="*{username}">
    <div class="error" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>

    <label for="password">Password</label>
    <input id="password" type="password" th:field="*{password}">
    <div class="error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>

    <label for="email">Email</label>
    <input id="email" type="email" th:field="*{email}">
    <div class="error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>

    <div class="actions">
        <button type="submit">Đăng ký</button>
        <a th:href="@{/home}">Về trang chủ</a>
    </div>
</form>
</body>
</html>
