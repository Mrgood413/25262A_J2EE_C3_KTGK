<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang chủ - Danh sách bác sĩ</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; }
        .card { border: 1px solid #ddd; border-radius: 8px; padding: 12px; }
        .card img { width: 100%; height: 180px; object-fit: cover; border-radius: 6px; background: #f2f2f2; }
        .pagination { margin-top: 18px; display: flex; gap: 8px; flex-wrap: wrap; }
        .pagination a, .pagination span { border: 1px solid #ccc; padding: 6px 10px; text-decoration: none; border-radius: 4px; }
        .active { background: #1976d2; color: white; border-color: #1976d2; }
    </style>
</head>
<body>
<div class="header">
    <h1>Danh sách bác sĩ</h1>
    <div>
        <a th:href="@{/register}">Đăng ký bệnh nhân</a> |
        <a th:href="@{/courses}">Courses</a> |
        <a th:href="@{/enroll}" sec:authorize="hasRole('PATIENT')">My Appointments</a>
        <span sec:authorize="hasRole('PATIENT')">|</span>
        <a th:href="@{/admin/doctors}">Quản lý bác sĩ (ADMIN)</a>
        <span sec:authorize="!isAuthenticated()">| <a th:href="@{/login}">Đăng nhập</a></span>
        <form sec:authorize="isAuthenticated()" th:action="@{/logout}" method="post" style="display:inline;">
            | <button type="submit">Đăng xuất</button>
        </form>
    </div>
</div>

<form th:action="@{/home}" method="get" style="margin-bottom: 14px;">
    <input type="text" name="keyword" placeholder="Tìm theo tên bác sĩ..." th:value="${keyword}" style="padding:6px;width:260px;">
    <button type="submit">Tìm kiếm</button>
</form>

<div class="grid">
    <div class="card" th:each="doctor : ${doctorPage.content}">
        <img th:src="${doctor.image}" alt="Ảnh bác sĩ">
        <h3 th:text="${doctor.name}">Tên bác sĩ</h3>
        <p><strong>Chuyên khoa:</strong> <span th:text="${doctor.specialty}">Nội tổng quát</span></p>
        <p><strong>Khoa:</strong> <span th:text="${doctor.department.name}">Khoa Nội</span></p>
        <form sec:authorize="hasRole('PATIENT')" th:action="@{/enroll/create}" method="post">
            <input type="hidden" name="doctorId" th:value="${doctor.id}">
            <label style="display:block;margin-bottom:4px;"><strong>Ngày khám:</strong></label>
            <input type="date" name="appointmentDate" required>
            <button type="submit" style="margin-top:8px;">Đặt lịch</button>
        </form>
    </div>
</div>

<div class="pagination" th:if="${doctorPage.totalPages > 0}">
    <a th:if="${!doctorPage.first}" th:href="@{/home(page=${currentPage - 1}, keyword=${keyword})}">Trước</a>

    <span th:each="i : ${#numbers.sequence(0, doctorPage.totalPages - 1)}">
        <a th:if="${i != currentPage}" th:href="@{/home(page=${i}, keyword=${keyword})}" th:text="${i + 1}"></a>
        <span th:if="${i == currentPage}" class="active" th:text="${i + 1}"></span>
    </span>

    <a th:if="${!doctorPage.last}" th:href="@{/home(page=${currentPage + 1}, keyword=${keyword})}">Sau</a>
</div>
</body>
</html>
