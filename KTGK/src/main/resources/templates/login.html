<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; max-width: 500px; }
        label { display: block; margin-top: 10px; font-weight: bold; }
        input { width: 100%; padding: 8px; margin-top: 4px; }
        .msg { margin-top: 10px; color: #c62828; }
        .ok { margin-top: 10px; color: #2e7d32; }
    </style>
</head>
<body>
<h1>Đăng nhập</h1>

<p class="msg" th:if="${param.error}">Sai username hoặc password.</p>
<p class="ok" th:if="${param.logout}">Bạn đã đăng xuất.</p>

<form th:action="@{/login}" method="post">
    <label for="username">Username</label>
    <input id="username" name="username" type="text">

    <label for="password">Password</label>
    <input id="password" name="password" type="password">

    <div style="margin-top: 14px;">
        <button type="submit">Đăng nhập</button>
        <a th:href="@{/register}">Đăng ký</a>
    </div>
</form>
</body>
</html>
